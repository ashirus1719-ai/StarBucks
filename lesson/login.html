<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Вход</title>

<style>

body{
    font-family: Arial;
    background: linear-gradient(45deg,#1e1e2f,#3a3a60);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.login-box{
    background:white;
    padding:40px;
    border-radius:12px;
    width:300px;
    text-align:center;
}

.login-box h2{
    margin-bottom:20px;
}

input{
    width:100%;
    padding:10px;
    margin:10px 0;
    border-radius:8px;
    border:1px solid #ccc;
}

button{
    width:100%;
    padding:10px;
    border:none;
    border-radius:8px;
    background:#4a6cff;
    color:white;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#3b55cc;
}

.link{
    margin-top:15px;
    font-size:14px;
}

.link a{
    color:#4a6cff;
    text-decoration:none;
}

</style>
</head>

<body>

<div class="login-box">

<h2>Вход</h2>

<input type="text" placeholder="Ник">

<input type="password" placeholder="Пароль">

<button>Войти</button>

<div class="link">
Нет аккаунта? <a href="register.html">Создать аккаунт</a>
</div>

</div>

</body>
</html>
