<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Регистрация</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: linear-gradient(45deg, #1e1e2f, #3a3a60);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.register-box {
    background: white;
    padding: 40px;
    border-radius: 12px;
    width: 320px;
    text-align: center;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

.register-box h2 {
    margin-bottom: 20px;
    color: #333;
}

input {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border-radius: 8px;
    border: 1px solid #ccc;
    font-size: 14px;
}

input:focus {
    outline: none;
    border-color: #4a6cff;
    box-shadow: 0 0 5px rgba(74,108,255,0.5);
}

button {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 8px;
    background: #4a6cff;
    color: white;
    font-size: 16px;
    cursor: pointer;
    margin-top: 10px;
    transition: 0.2s;
}

button:hover {
    background: #3b55cc;
}

.link {
    margin-top: 15px;
    font-size: 14px;
}

.link a {
    color: #4a6cff;
    text-decoration: none;
}

</style>
</head>

<body>

<div class="register-box">

<h2>Регистрация</h2>

<input type="text" placeholder="Ник">
<input type="email" placeholder="Email">
<input type="password" placeholder="Пароль">
<input type="password" placeholder="Подтвердите пароль">

<button>Зарегистрироваться</button>

<div class="link">
Уже есть аккаунт? <a href="login.html">Войти</a>
</div>

</div>

</body>
</html>
